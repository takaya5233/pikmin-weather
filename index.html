<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunshine Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
        :root {
            --bg-gradient: linear-gradient(180deg, #FFF9E1 0%, #FFD1A9 50%, #FFB7B2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #5D4037; --text-sub: #8D6E63;
            --ok: #28cd41; --warn: #FF9800; --ng: #FF5252;
        }
        body { margin: 0; padding: 0; font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg-gradient); display: flex; justify-content: center; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .phone-canvas { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 10px; padding: 15px 12px 60px; box-sizing: border-box; }
        
        /* コンテンツ */
        #dt { text-align: center; margin: 15px 0 5px; }
        #time { font-size: 4.5rem; font-weight: 900; margin: -5px 0; letter-spacing: -2px; }
        #date { font-size: 1.2rem; font-weight: 700; color: var(--text-sub); }
        
        .quote-c { margin: 10px 5px; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .quote-text { font-size: 0.9rem; font-weight: 700; line-height: 1.6; }
        .quote-author { font-size: 0.7rem; color: var(--text-sub); text-align: right; display: block; margin-top: 6px; }

        .card { background: var(--glass-bg); backdrop-filter: blur(8px); border: 2px solid #fff; border-radius: 24px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 0.85rem; font-weight: 900; color: var(--text-sub); margin-bottom: 10px; display: block; }

        /* 今日のあんしん予報 */
        .current-main { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .left-weather-stack {
            display: flex; flex-direction: column; align-items: center;
            min-width: 90px; background: rgba(255,255,255,0.4);
            padding: 8px 4px; border-radius: 16px;
        }
        .weather-top-row { display: flex; align-items: center; gap: 4px; justify-content: center; width: 100%; line-height: 1; }
        .current-icon-box { font-size: 1.6rem; }
        .temp-display { font-size: 1.8rem; font-weight: 700; letter-spacing: -1px; }
        .today-temp-range { font-size: 0.75rem; font-weight: 700; margin-top: 4px; text-align: center; }

        .badges { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
        .badge {
            font-size: 0.75rem; font-weight: 700; padding: 6px 10px;
            border-radius: 12px; background: #fff;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(0,0,0,0.03);
            width: 100%; box-sizing: border-box;
        }
        .dot { height: 8px; width: 8px; border-radius: 50%; flex-shrink: 0; }

        .tomorrow-box { border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tomorrow-label { font-size: 0.8rem; font-weight: 900; color: var(--text-sub); }
        .tom-temp { font-size: 1rem; font-weight: 700; }

        /* 予報スクロール */
        .hourly-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .h-item { text-align: center; min-width: 45px; }
        .h-icon { font-size: 1.5rem; margin: 4px 0; display: block; }
        .hourly-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); border-top: 1px dashed rgba(0,0,0,0.1); }

        .weekly { display: flex; justify-content: space-between; text-align: center; font-size: 0.75rem; font-weight: 700; }
        .w-icon { font-size: 1.3rem; margin: 4px 0; display: block; }
        .p-img-card { background: #fff; border-radius: 20px; overflow: hidden; margin-top: 10px; border: 1px solid #eee; }
        .p-img-card img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
<div class="phone-canvas">
    <header id="dt">
        <div id="date">...</div>
        <div id="time">00:00</div>
    </header>

    <div class="quote-c">
        <span id="quote" class="quote-text">...</span>
        <span class="quote-author">― 空海</span>
    </div>

    <section class="card">
        <span class="section-title">今日のあんしん予報</span>
        <div class="current-main">
            <div class="left-weather-stack">
                <div class="weather-top-row">
                    <div id="c-icon" class="current-icon-box">☀️</div>
                    <div id="c-temp" class="temp-display">--°</div>
                </div>
                <div id="c-range" class="today-temp-range">-- / --</div>
            </div>
            <div id="badges" class="badges"></div>
        </div>
        <div class="tomorrow-box">
            <span class="tomorrow-label">明日の予報</span>
            <div id="tom-info" style="display:flex; align-items:center; gap:10px;"></div>
        </div>
    </section>

    <section class="card">
        <span class="section-title">日没までの空もよう</span>
        <div id="h-list" class="hourly-scroll"></div>
        <div id="h-foot" class="hourly-footer"></div>
    </section>

    <section class="card">
        <span class="section-title">週間予報</span>
        <div id="w-list" class="weekly"></div>
    </section>

    <section class="card">
        <span class="section-title">ピクミンブルーム 最新情報</span>
        <div class="p-img-card"><div style="font-size:0.75rem; font-weight:900; text-align:center; padding:6px;">今月のお題</div><img src="https://lh3.googleusercontent.com/aOe_CqCJdFevS2otcFy913LHXkdbCpGQ4idw-DZqD6qYClbXBxMydcbSm5NhADdjoUnRu9Hg0hsm3RUgprGpSm6mss9BlI6_16k=e365-pa-nu-w1700"></div>
    </section>
</div>

<script>
    const kukaiQuotes = ["心暗きときは、即ち遭う所ことごとく禍なり。","自心の源をさとるを、さとりという。","心を明るくしていれば、どこにいても幸せは見つかります。","ものの興廃は、必ず人に由る。すべてはあなた次第です。","一隅を照らす。あなたらしく輝けばよいのです。","人の一生は、心ひとつの置きどころ。"];
    const weatherIcons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",80:"🌦️",81:"🌧️",82:"🌧️",95:"⚡"};
    
    function updateQuote() {
        document.getElementById('quote').innerText = kukaiQuotes[Math.floor(Math.random() * kukaiQuotes.length)];
    }

    function updateTime() {
        const n = new Date(); const d = ['日','月','火','水','木','金','土'];
        document.getElementById('date').innerText = (n.getMonth()+1)+'月'+n.getDate()+'日 ('+d[n.getDay()]+')';
        document.getElementById('time').innerText = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
    }

    function getFashion(t) {
        if(t<5) return "服装：冬の重装備で！"; if(t<10) return "服装：コートが必須"; if(t<15) return "服装：厚手のニットを"; if(t<20) return "服装：羽織ものが必要"; if(t<25) return "服装：長袖で快適"; return "服装：半袖でOK";
    }
    
    async function fetchWeather(pos) {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true&hourly=temperature_2m,weathercode,precipitation_probability,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=Asia%2FTokyo`);
        const data = await res.json();
        const hr = new Date().getHours();
        
        let walk = data.hourly.precipitation[hr] > 0 ? {t:"雨：散歩は控えめに",c:"#FF5252"} : {t:"散歩：お出かけ日和",c:"#28cd41"};
        let laundry = Math.max(...data.hourly.precipitation_probability.slice(8,17)) > 40 ? {t:"洗濯：部屋干し推奨",c:"#FF5252"} : {t:"洗濯：外干しOK",c:"#28cd41"};

        document.getElementById('c-icon').innerText = weatherIcons[data.current_weather.weathercode]||"☀️";
        document.getElementById('c-temp').innerText = Math.round(data.current_weather.temperature)+'°';
        const rangeH = `<span style="color:var(--ng)">${Math.round(data.daily.temperature_2m_max[0])}°</span>/<span style="color:#03a9f4">${Math.round(data.daily.temperature_2m_min[0])}°</span>`;
        document.getElementById('c-range').innerHTML = rangeH;
        document.getElementById('badges').innerHTML = `<div class="badge"><span class="dot" style="background:${walk.c}"></span>${walk.t}</div><div class="badge"><span class="dot" style="background:${laundry.c}"></span>${laundry.t}</div><div class="badge"><span class="dot" style="background:#03a9f4"></span>${getFashion(data.current_weather.temperature)}</div>`;
        
        const tomCode = data.daily.weathercode[1];
        document.getElementById('tom-info').innerHTML = `<span style="font-size:1.2rem;">${weatherIcons[tomCode]}</span> <span style="font-weight:700;">${Math.round(data.daily.temperature_2m_max[1])}° / ${Math.round(data.daily.temperature_2m_min[1])}°</span>`;

        let hH = ''; const sunsetH = parseInt(data.daily.sunset[0].split('T')[1]);
        data.hourly.time.forEach((t, i) => {
            const h = parseInt(t.split('T')[1]);
            if (t.includes(new Date().toLocaleDateString('sv')) && h >= hr && h <= sunsetH + 1) {
                hH += `<div class="h-item"><div style="font-size:0.7rem;">${h==hr?'今':h+'時'}</div><div style="font-size:1.3rem;">${weatherIcons[data.hourly.weathercode[i]]||"☀️"}</div><div style="font-weight:700;">${Math.round(data.hourly.temperature_2m[i])}°</div></div>`;
            }
        });
        document.getElementById('h-list').innerHTML = hH;
        document.getElementById('h-foot').innerHTML = `<span>🌡️${rangeH}</span><span>🌅${data.daily.sunrise[0].split('T')[1]}</span><span>🌇${data.daily.sunset[0].split('T')[1]}</span>`;

        let wH = ''; for(let i=0; i<5; i++) {
            const d = new Date(data.daily.time[i]);
            wH += `<div><div>${i==0?'今日':['日','月','火','水','木','金','土'][d.getDay()]}</div><div class="w-icon">${weatherIcons[data.daily.weathercode[i]]}</div><div>${Math.round(data.daily.temperature_2m_max[i])}°</div></div>`;
        }
        document.getElementById('w-list').innerHTML = wH;
    }

    updateQuote(); updateTime(); setInterval(updateTime, 60000);
    navigator.geolocation.getCurrentPosition(fetchWeather);
</script>
</body>
</html>
